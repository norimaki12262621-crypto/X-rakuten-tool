<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X × 楽天 自動投稿ツール</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; max-width: 640px; margin: 40px auto; padding: 16px; background: #f5f5f5; color: #111; }
  h1 { font-size: 20px; margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }

  .input-section { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .input-section label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 6px; }
  .url-row { display: flex; gap: 8px; }
  .url-input { flex: 1; padding: 10px 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; outline: none; }
  .url-input:focus { border-color: #000; }
  .url-hint { font-size: 11px; color: #aaa; margin-top: 6px; }

  .tabs { display: flex; border-bottom: 1px solid #ddd; margin-bottom: 20px; gap: 0; }
  .tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; color: #888; background: none; border-top: none; border-left: none; border-right: none; font-family: sans-serif; }
  .tab.active { color: #000; border-bottom-color: #000; font-weight: bold; }

  input[type=number] { width: 100%; padding: 9px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; background: #fff; outline: none; }
  input[type=number]:focus { border-color: #000; }
  .preset-section { margin-bottom: 14px; }
  .preset-section-label { font-size: 11px; font-weight: bold; color: #888; margin-bottom: 7px; }
  .preset-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .preset-chip { padding: 5px 11px; border: 1px solid #ddd; border-radius: 20px; font-size: 12px; cursor: pointer; background: #fff; color: #333; font-family: sans-serif; }
  .preset-chip:hover { border-color: #999; }
  .preset-chip.active { background: #000; color: #fff; border-color: #000; }
  .budget-row { margin-top: 14px; }
  .budget-row label { display: block; font-size: 12px; font-weight: bold; color: #555; margin-bottom: 6px; }

  .btn-main { display: block; width: 100%; background: #000; color: #fff; border: none; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 16px; }
  .btn-main:disabled { opacity: 0.45; cursor: not-allowed; }

  #result { background: #fff; border: 1px solid #ddd; border-radius: 10px; padding: 18px; margin-top: 16px; display: none; }
  .product-info { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 14px; }
  .product-info img { width: 80px; height: 80px; object-fit: contain; border: 1px solid #eee; border-radius: 6px; background: #fff; flex-shrink: 0; }
  .product-info .detail { font-size: 13px; flex: 1; }
  .product-info .name { font-weight: bold; margin-bottom: 4px; line-height: 1.45; }
  .product-info .price { color: #BF0000; font-weight: bold; font-size: 15px; }
  .product-info .shop { color: #999; font-size: 11px; margin-top: 3px; }
  .reason { background: #f0f7ff; border-left: 3px solid #4a90e2; padding: 9px 12px; font-size: 12px; color: #444; margin-bottom: 14px; border-radius: 0 4px 4px 0; line-height: 1.6; }
  .result-label { font-size: 12px; font-weight: bold; color: #555; margin-bottom: 6px; }
  #post-text { width: 100%; min-height: 120px; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 6px; line-height: 1.6; resize: vertical; }
  #char-count { font-size: 12px; color: #888; text-align: right; margin-bottom: 14px; }
  #char-count.over { color: red; }
  .btn-post { display: block; width: 100%; background: #000; color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
  .btn-post:disabled { opacity: 0.45; cursor: not-allowed; }
  #msg { margin-top: 10px; font-size: 13px; }
  .err-msg { background: #fee; border: 1px solid #f5c6c6; border-radius: 6px; padding: 10px 12px; font-size: 13px; color: #b00; margin-top: 12px; display: none; }
  .err-msg.on { display: block; }
</style>
</head>
<body>

<h1>𝕏 × 楽天 自動投稿ツール</h1>
<div class="subtitle">楽天商品をAIが分析 → Xに自動投稿</div>

<div class="input-section">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('url')">🔗 URL入力</button>
    <button class="tab" onclick="switchTab('genre')">🎯 ジャンル選択</button>
  </div>

  <!-- URL入力タブ -->
  <div id="tab-url">
    <label>楽天商品ページのURL</label>
    <div class="url-row">
      <input type="text" id="product-url" class="url-input" placeholder="https://item.rakuten.co.jp/shop/item-code/" />
    </div>
    <div class="url-hint">例: https://item.rakuten.co.jp/rl-waffle/0000107/ または https://a.r10.to/xxxxx</div>
  </div>

  <!-- ジャンル選択タブ -->
  <div id="tab-genre" style="display:none;">
    <input type="hidden" id="genre" value="母の日 ギフト">

    <div class="preset-section">
      <div class="preset-section-label">🎁 ギフト・プレゼント</div>
      <div class="preset-chips">
        <button class="preset-chip active" onclick="selectGenre(this,'母の日 ギフト')">母の日ギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'父の日 ギフト')">父の日ギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'誕生日 プレゼント 女性')">誕生日（女性）</button>
        <button class="preset-chip" onclick="selectGenre(this,'誕生日 プレゼント 男性')">誕生日（男性）</button>
        <button class="preset-chip" onclick="selectGenre(this,'クリスマス ギフト')">クリスマスギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'結婚祝い ギフト')">結婚祝い</button>
        <button class="preset-chip" onclick="selectGenre(this,'出産祝い ギフト')">出産祝い</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">🎁 イベント・季節</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'父の日 ギフト プレゼント')">父の日ギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'敬老の日 ギフト プレゼント')">敬老の日ギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'ハロウィン グッズ 人気')">ハロウィングッズ</button>
        <button class="preset-chip" onclick="selectGenre(this,'クリスマス ギフト プレゼント 人気')">クリスマスギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'お正月 お年賀 ギフト')">お正月・お年賀</button>
        <button class="preset-chip" onclick="selectGenre(this,'卒業 入学祝い プレゼント')">卒業・入学祝い</button>
        <button class="preset-chip" onclick="selectGenre(this,'就職 昇進祝い プレゼント')">就職・昇進祝い</button>
        <button class="preset-chip" onclick="selectGenre(this,'結婚記念日 ギフト プレゼント')">結婚記念日ギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'バレンタイン ギフト チョコ 人気')">バレンタインギフト</button>
        <button class="preset-chip" onclick="selectGenre(this,'ホワイトデー ギフト お返し 人気')">ホワイトデーギフト</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">🎀 可愛い雑貨</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'可愛い 収納 ケース 人気')">可愛い収納・入れ物</button>
        <button class="preset-chip" onclick="selectGenre(this,'韓国 雑貨 インテリア 人気')">韓国雑貨・インテリア</button>
        <button class="preset-chip" onclick="selectGenre(this,'おしゃれ 食器 キッチン雑貨 人気')">おしゃれ食器・キッチン雑貨</button>
        <button class="preset-chip" onclick="selectGenre(this,'推し活 グッズ 人気')">推し活グッズ</button>
        <button class="preset-chip" onclick="selectGenre(this,'ぬいぐるみ かわいい おもちゃ 人気')">ぬいぐるみ・おもちゃ</button>
        <button class="preset-chip" onclick="selectGenre(this,'フォトフレーム アルバム おしゃれ 人気')">フォトフレーム・アルバム</button>
        <button class="preset-chip" onclick="selectGenre(this,'可愛い ポーチ バッグ 人気')">可愛いポーチ・バッグ</button>
        <button class="preset-chip" onclick="selectGenre(this,'アクセサリーケース おしゃれ 人気')">アクセサリーケース</button>
        <button class="preset-chip" onclick="selectGenre(this,'おしゃれ 文房具 ステーショナリー 人気')">おしゃれ文房具</button>
        <button class="preset-chip" onclick="selectGenre(this,'スマホケース 可愛い おしゃれ 人気')">可愛いスマホケース</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">🍱 食品・グルメ</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'お取り寄せ グルメ 人気')">お取り寄せグルメ</button>
        <button class="preset-chip" onclick="selectGenre(this,'スイーツ お菓子 人気')">スイーツ・お菓子</button>
        <button class="preset-chip" onclick="selectGenre(this,'ラーメン 取り寄せ 人気')">ラーメン・麺類</button>
        <button class="preset-chip" onclick="selectGenre(this,'肉 ステーキ 取り寄せ')">肉・ステーキ</button>
        <button class="preset-chip" onclick="selectGenre(this,'海鮮 取り寄せ 人気')">海鮮・魚介</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">💄 美容・コスメ</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'化粧水 スキンケア 人気')">化粧水・スキンケア</button>
        <button class="preset-chip" onclick="selectGenre(this,'美容液 人気 おすすめ')">美容液・セラム</button>
        <button class="preset-chip" onclick="selectGenre(this,'日焼け止め 人気')">日焼け止め</button>
        <button class="preset-chip" onclick="selectGenre(this,'シャンプー トリートメント 人気')">シャンプー・ヘアケア</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">🏠 生活・インテリア</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'キッチン 調理器具 人気')">キッチン・調理器具</button>
        <button class="preset-chip" onclick="selectGenre(this,'インテリア 雑貨 人気')">インテリア・雑貨</button>
        <button class="preset-chip" onclick="selectGenre(this,'寝具 枕 人気')">寝具・枕・布団</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">📱 家電・ガジェット</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'イヤホン ワイヤレス 人気')">イヤホン・ヘッドフォン</button>
        <button class="preset-chip" onclick="selectGenre(this,'モバイルバッテリー 人気')">モバイルバッテリー</button>
        <button class="preset-chip" onclick="selectGenre(this,'家電 小型 人気 おすすめ')">小型家電</button>
      </div>
    </div>

    <div class="preset-section">
      <div class="preset-section-label">🐾 ペット</div>
      <div class="preset-chips">
        <button class="preset-chip" onclick="selectGenre(this,'犬 おやつ 人気')">犬用おやつ・フード</button>
        <button class="preset-chip" onclick="selectGenre(this,'猫 おやつ 人気')">猫用おやつ・フード</button>
      </div>
    </div>

    <div class="budget-row">
      <label>予算上限（円）</label>
      <input type="number" id="max-price" value="5000" step="500" min="500" />
    </div>
  </div>

  <div class="err-msg" id="err-msg"></div>
  <button class="btn-main" id="fetch-btn" onclick="fetchProduct()">🔍 分析してポスト文を生成</button>
</div>

<div id="result">
  <div class="product-info">
    <img id="prod-img" src="" alt="商品画像">
    <div class="detail">
      <div class="name" id="prod-name"></div>
      <div class="price" id="prod-price"></div>
      <div class="shop" id="prod-shop"></div>
    </div>
  </div>
  <div class="reason" id="prod-reason"></div>
  <div class="result-label">投稿テキスト（編集可能）</div>
  <textarea id="post-text" oninput="updateCount()"></textarea>
  <div id="char-count">0 / 280</div>
  <button class="btn-post" id="post-btn" onclick="postToX()">𝕏 に投稿する</button>
  <div id="msg"></div>
</div>

<script>
let currentTab = 'url';

function selectGenre(el, value) {
  document.querySelectorAll('.preset-chip').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('genre').value = value;
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-url').style.display = tab === 'url' ? 'block' : 'none';
  document.getElementById('tab-genre').style.display = tab === 'genre' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((el, i) => {
    el.classList.toggle('active', (i === 0 && tab === 'url') || (i === 1 && tab === 'genre'));
  });
  document.getElementById('result').style.display = 'none';
  document.getElementById('err-msg').classList.remove('on');
}

async function fetchProduct() {
  const btn = document.getElementById('fetch-btn');
  const errEl = document.getElementById('err-msg');
  btn.disabled = true;
  btn.textContent = '分析中...';
  document.getElementById('result').style.display = 'none';
  errEl.classList.remove('on');

  try {
    let res;
    let pageImageUrl = '';
    if (currentTab === 'url') {
      const url = document.getElementById('product-url').value.trim();
      if (!url) throw new Error('URLを入力してください');
      try {
        const u = new URL(url);
        const host = u.hostname;
        if (!host.includes('rakuten.co.jp') && host !== 'a.r10.to') {
          throw new Error('楽天商品ページのURLを入力してください（item.rakuten.co.jp または a.r10.to）');
        }
      } catch(urlErr) {
        if (urlErr.message.includes('rakuten')) throw urlErr;
        throw new Error('有効なURLを入力してください');
      }
      const [mainRes, imgRes] = await Promise.all([
        fetch(`/api/get-product-url?url=${encodeURIComponent(url)}`),
        fetch(`/api/get-image?url=${encodeURIComponent(url)}`),
      ]);
      res = mainRes;
      pageImageUrl = await imgRes.json().then(d => d.imageUrl || '').catch(() => '');
    } else {
      const genre = document.getElementById('genre').value;
      const maxPrice = document.getElementById('max-price').value;
      res = await fetch(`/api/get-product?genre=${encodeURIComponent(genre)}&maxPrice=${maxPrice}`);
    }

    const data = await res.json();
    if (!data.success) throw new Error(data.error || '取得に失敗しました');

    const p = data.product;
    const imgSrc = pageImageUrl || p.image || '';
    document.getElementById('prod-img').src = imgSrc;
    document.getElementById('prod-img').style.display = imgSrc ? 'block' : 'none';
    document.getElementById('prod-name').textContent = p.name;
    document.getElementById('prod-price').textContent = `¥${Number(p.price).toLocaleString()}`;
    document.getElementById('prod-shop').textContent = p.shop || '';
    document.getElementById('prod-reason').textContent = data.reason ? '💡 ' + data.reason : '';
    document.getElementById('post-text').value = data.postText;
    document.getElementById('result').style.display = 'block';
    updateCount();
  } catch(e) {
    errEl.textContent = '⚠️ ' + e.message;
    errEl.classList.add('on');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 分析してポスト文を生成';
  }
}

function updateCount() {
  const text = document.getElementById('post-text').value;
  const count = [...text].length;
  const el = document.getElementById('char-count');
  el.textContent = `${count} / 280`;
  el.className = count > 280 ? 'over' : '';
}

async function postToX() {
  const btn = document.getElementById('post-btn');
  const msg = document.getElementById('msg');
  const text = document.getElementById('post-text').value;
  if ([...text].length > 280) {
    msg.innerHTML = '<span style="color:red">❌ 280字を超えています</span>';
    return;
  }
  btn.disabled = true;
  btn.textContent = '投稿中...';
  msg.innerHTML = '';
  try {
    const res = await fetch('/api/post-tweet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text }),
    });
    const data = await res.json();
    if (data.success) {
      msg.innerHTML = `<span style="color:green">✅ 投稿成功！ <a href="https://x.com/i/web/status/${data.tweet_id}" target="_blank">ツイートを見る</a></span>`;
    } else {
      msg.innerHTML = `<span style="color:red">❌ ${data.error}</span>`;
    }
  } catch(e) {
    msg.innerHTML = `<span style="color:red">❌ 通信エラー: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '𝕏 に投稿する';
  }
}
</script>
</body>
</html>
